        .animate-fade-in-down { animation: fadeInDown 0.4s ease-out forwards; }

        const ECHELONS_PFEQ = [
          { id: 1, cycles: ['Cycle 1'], label: "Échelon 1 : (cycle 1)", description: "L’élève fait semblant de lire lorsqu’il feuillette un livre. Il parvient à se le raconter intérieurement ou à le raconter à autrui en s’appuyant notamment sur les illustrations. Dans les textes qu’il aborde, il reconnaît quelques mots familiers ou déjà vus en classe. Il réussit à suivre des consignes simples comprenant surtout des mots connus. Il cherche aussi à donner du sens aux écrits qu’il rencontre autour de lui et il en parle volontiers." },
          { id: 2, cycles: ['Cycle 1'], label: "Échelon 2 : (Cycle 1)", description: "L’élève lit des petits messages ou des textes courts, simples et illustrés constitués majoritairement de mots familiers et d’usage fréquent. Afin de construire du sens, il utilise, avec de l’aide, des stratégies de reconnaissance et d’identification de mots telles que les correspondances entre les lettres et les sons ainsi que le recours au contexte et aux illustrations. Il parvient à accomplir des tâches très simples liées à diverse intentions de lecture. Il réagit au texte dans la mesure où il est sollicité." },
          { id: 3, cycles: ['Cycle 1'], label: "Échelon 3 : (Cycle 1)", description: "L’élève lit des textes courants et littéraires, simples et illustrés, dont la structure est généralement prévisible. Pour comprendre l’essentiel d’un texte, il utilise les stratégies appropriées et rappelées par l’enseignant. Lorsqu’il accomplit des tâches simples liées à diverses intentions de lecture, il dégage les informations explicites nécessaires. Quand il réagit au texte, il exprime ses réactions en ayant recours surtout au dessin ou à la parole." },
          { id: 4, cycles: ['Cycle 1', 'Cycle 2'], label: "Échelon 4 : (Fin cycle 1 / début cycle 2)", description: "L’élève lit des textes courants et littéraires généralement courts, illustrés et présentant un niveau de difficulté approprié. Afin de comprendre les textes qu’il lit, l’élève a recours aux principales stratégies apprises. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture, il dégage la plupart des informations explicites contenues dans un ou plusieurs courts textes. De façon générale, il réagit spontanément aux textes et ses réactions, souvent liées à ses expériences personnelles, peuvent se manifester par le recours à la parole, au dessin, au mime, au non verbal et quelquefois à l’écrit." },
          { id: 5, cycles: ['Cycle 2'], label: "Échelon 5 : (Cycle 2)", description: "L’élève lit des textes courants et littéraires, proposant un défi approprié, généralement illustrés et présentés sur différents supports médiatiques. Il utilise la plupart des stratégies auxquelles il a été initié pour comprendre les textes. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture, il dégage les éléments d’information explicites et, à l’occasion, certains éléments d’information implicites liés à ses connaissances et à ses expériences personnelles. Il réagit aux textes qu’il lit et ses réactions, orales et parfois écrites, s’appuient aussi sur ses expériences personnelles." },
          { id: 6, cycles: ['Cycle 2'], label: "Échelon 6 : (Cycle 2)", description: "L’élève lit des textes courants et littéraires, proposant un défi approprié, souvent illustrés et présentés sur différents supports médiatiques. Il utilise les différentes stratégies apprises pour mieux saisir l’information. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture ou rattachées aux disciplines scolaires, il parvient à dégager des éléments d’information explicites et, parfois, quelques-uns qui sont implicites. Il réagit aux textes qu’il lit surtout en les reliant à ses expériences personnelles et parfois à d’autres textes qu’il a lus." },
          { id: 7, cycles: ['Cycle 2', 'Cycle 3'], label: "Échelon 7 : (Fin cycle 2 / début cycle 3)", description: "L’élève lit des textes courants et littéraires qui peuvent être illustrés et présentés sur différents supports médiatiques. Dans des textes qui présentent pour lui un défi raisonnable, il fait appel à diverses stratégies, dont certaines lui permettent de mieux saisir et organiser l’information. Pour répondre à diverse intentions de lecture et pour accomplir des tâches significatives dans plusieurs disciplines scolaires, il réussit à dégager les éléments d’information explicites et parfois ceux qui sont implicites. Lorsqu’il réagit à certains aspects des textes qu’il lit, il le fait généralement de façon pertinente en les reliant à ses expériences personnelles et à d’autres textes l’il a lus." },
          { id: 8, cycles: ['Cycle 3'], label: "Échelon 8 : (cycle 3)", description: "L’élève lit une variété de textes courants et littéraires, présentés sur différents supports médiatiques et proposant un défi raisonnable. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture dans différentes disciplines scolaires, il dégage avec efficacité les éléments d’information explicites et quelques éléments d’information implicites contenus dans un même texte et, à l’occasion, dans plusieurs textes, en utilisant les stratégies pertinentes. Il réagit à divers aspects des textes en les reliant à ses expériences personnelles ou scolaires et parfois à d’autres lectures." },
          { id: 9, cycles: ['Cycle 3'], label: "Échelon 9 : (Cycle 3)", description: "L’élève lit une variété de textes courants et littéraires, présentés sur différents supports médiatiques et proposant un défi raisonnable. Lorsqu’il accomplit des tâches liées à diverse intentions de lecture dans différents contextes et disciplines scolaires, il dégage les éléments d’information explicites et implicites contenus dans plusieurs textes en utilisant efficacement des stratégies pertinentes. Il réagit à plusieurs aspects des textes et ses réactions témoignent de son interprétation personnelle, de ses connaissances, de ses expériences personnelles ou scolaires ainsi que de ses autres lectures." },
          { id: 10, cycles: ['Cycle 3'], label: "Échelon 10 : (Cycle 3)", description: "L’élève lit une grande diversité de textes courants et littéraires, de niveaux de difficulté variables, et présentés sur différents supports médiatiques. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture dans différents contextes et disciplines scolaires, il dégage les éléments d’information tant explicites qu’implicites contenus dans un ou plusieurs textes en ayant recours à des stratégies variées et pertinentes. Il réagit aux différents aspects des textes et ses réactions témoignent de ses champs d’intérêt, de son interprétation personnelle, de ses connaissances, de ses expériences personnelles ou scolaires ainsi que de ses autres lectures." }
        ];

        const PALIERS_ILSS = [
          { id: 1, label: "Palier 1", description: "L’élève comprend des textes courants ou littéraires, illustrés et dont le sujet est familier. Ces textes à structure prévisible sont constitués de mots ou de phrases simples liés à son environnement immédiat. Il reconnaît globalement certains mots appris en classe et lit des mots composés de syllabes simples. Il associe des mots à images et réagit de façon non verbale au texte.\n* Avec l’aide de l’enseignant, l’élève utilise des stratégies enseignées." },
          { id: 2, label: "Palier 2", description: "L’élève comprend des textes courants ou littéraires, illustrés et dont le sujet est familier. Ces textes à structure généralement prévisible, sont constitués de quelques phrases simples et d’un vocabulaire de base. Il reconnaît la plupart des mots appris en classe et lit des mots composés de syllabes simples et parfois complexes. Il repère des informations explicites et exprime sa réaction au texte en faisant quelques liens avec ses connaissances et ses expériences.\n* Avec l’aide de l’enseignant, l’élève utilise des stratégies enseignées et les ressources suggérées." },
          { id: 3, label: "Palier 3", description: "L’élève comprend des textes courants ou littéraires, illustrés et dont le sujet est généralement familier. Ces textes sont constitués de quelques paragraphes comportant des phrases simples et un vocabulaire courant. Il lit par groupe de mots, avec ou sans hésitation. Il identifie le sujet traité et se sert du contexte pour comprendre le sens de nouveaux mots. Il sélectionne des informations explicites et relève parfois l’idée principale du texte. Il effectue des liens avec ses connaissances et ses expériences et se sert de faits ou d’exemples du texte pour appuyer sa réaction.\n* L’élève utilise des stratégies suggérées. Avec l’aide de l’enseignant, il répond à des questions sur sa démarche de lecture." },
          { id: 4, label: "Palier 4", description: "L’élève comprend des textes courants ou littéraires dont le sujet est plus ou moins familier. Ces textes sont constitués de plusieurs paragraphes comportant des phrases complexes et un vocabulaire spécifique des disciplines scolaires. Il dégage l’idée principale ainsi que certaines informations essentielles et se sert d’indices linguistiques pour déduire le sens du texte. Il regroupe des informations explicites et relève les principaux éléments qui illustrent la progression dans le texte. Il exprime sa réaction au texte en faisant des liens avec différents textes lus, vus ou entendus.\n* L’élève utilise des stratégies et différentes ressources. Avec l’aide de l’enseignant, il décrit sa démarche de lecture et identifie ses forces et ses faiblesses." },
          { id: 5, label: "Palier 5", description: "L’élève comprend des textes courants ou littéraires dont le sujet est peu ou pas familier. Ces textes sont constitués de plusieurs paragraphes comportant des phrases variées et un vocabulaire étendu. Il distingue l’idée principale des idées secondaires et peut résumer le texte en présentant les idées de façon logique ou chronologique. Il se sert de ses connaissances antérieures et du contenu du texte pour dégager le sens de certaines informations implicites." }
        ];

        const FIGURES_STYLE = [
          { id: 'Comparaison', label: 'Comparaison', desc: 'Comparer deux éléments avec un mot de liaison comme « comme » ou « tel ». Exemple : « Il est fort comme un lion »' },
          { id: 'Métaphore', label: 'Métaphore', desc: 'Comparer deux éléments sans mot de liaison, en disant qu’un élément est l’autre. Exemple : « Cet homme est un lion »' },
          { id: 'Hyperbole', label: 'Hyperbole', desc: 'Exagération volontaire pour mettre une idée en valeur. Exemple : « Je meurs de faim »' },
          { id: 'Personnification', label: 'Personnification', desc: 'Donner des caractéristiques humaines à un objet ou un animal. Exemple : « Le vent hurle »' },
          { id: 'Répétition', label: 'Répétition', desc: 'Répéter un mot ou groupe de mots pour insister ou créer un rythme. Exemple : « Jamais, jamais, jamais je n’oublierai »' },
          { id: 'Énumération', label: 'Énumération', desc: 'Lister plusieurs éléments pour créer un effet d’accumulation. Exemple : « Il mange des pommes, des poires, des bananes… »' },
          { id: 'Antithèse / Contraste', label: 'Antithèse / Contraste', desc: 'Opposer deux idées pour faire ressortir leur différence. Exemple : « Il rit dans la tristesse »' },
          { id: 'Oxymore', label: 'Oxymore', desc: 'Associer deux mots aux sens opposés côte à côte. Exemple : « Une obscure clarté »' },
          { id: 'Question rhétorique', label: 'Question rhétorique', desc: 'Poser une question sans attendre de réponse pour faire réfléchir. Exemple : « Qui pourrait refuser une telle offre ? »' },
          { id: 'Allitération', label: 'Allitération', desc: 'Répétition d’un même son consonne dans une phrase ou un vers. Exemple : « Pour qui sont ces serpents qui sifflent… »' },
          { id: 'Assonance', label: 'Assonance', desc: 'Répétition d’un même son voyelle pour créer musicalité. Exemple : « Les sanglots longs des violons… »' },
          { id: 'Euphémisme', label: 'Euphémisme', desc: 'Adoucir une réalité difficile ou choquante. Exemple : « Il nous a quittés » (au lieu de dire qu’il est mort)' },
          { id: 'Litote', label: 'Litote', desc: 'Dire moins pour suggérer plus. Exemple : « Ce n’est pas mauvais » (en réalité, c’est bien)' },
          { id: 'Ironie', label: 'Ironie', desc: 'Dire le contraire de ce que l’on pense, souvent pour se moquer. Exemple : « Bravo, tu as encore oublié ! »' },
          { id: 'Champ lexical', label: 'Champ lexical', desc: 'Ensemble de mots liés à un même thème pour créer une ambiance. Exemple : mer : vague, eau, bateau, océan…' },
          { id: 'Métonymie', label: 'Métonymie', desc: 'Remplacer un mot par un autre lié logiquement. Exemple : « Boire un verre » (le contenu, pas le verre)' },
          { id: 'Symbole', label: 'Symbole', desc: 'Un objet ou élément qui représente une idée ou un concept. Exemple : « La colombe » = paix' },
          { id: 'Gradation', label: 'Gradation', desc: 'Suite de mots ou idées de plus en plus forts ou faibles pour créer un effet. Exemple : « Je marche, je cours, je vole ! »' },
          { id: 'Contraste', label: 'Contraste', desc: 'Accentuer les différences pour faire ressortir une idée ou un effet. Exemple : « Le jour éclatant, la nuit sombre »' }
        ];

          'Monstres gentils', 'Châteaux et chevaliers', 'Pirates', 'Cirque', 'Animaux fantastiques',

        ];

        const STYLES_LIST = [
          { id: 'Humoristique', label: '😂 1. Texte humoristique', desc: 'Un texte qui fait rire (situations drôles, exagération, jeux de mots).' },
          { id: 'Aventure', label: '🧭 2. Texte d’aventure', desc: 'Une quête, un voyage, des défis à relever.' },

          { id: 'Animalier', label: '🐾 9. Texte animalier', desc: 'Animaux qui vivent des aventures ou racontent leur vie.' },
          { id: 'Écologique', label: '🌍 10. Texte écologique', desc: 'Nature, environnement, protection de la planète.' },
          { id: 'Historique', label: '⚔️ 11. Texte historique / inspiré du passé', desc: 'Châteaux, chevaliers, civilisations anciennes.' },

        root.render(<App />);
