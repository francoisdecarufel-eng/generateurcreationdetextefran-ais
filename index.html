        const ECHELONS_PFEQ = [
          { id: 1, cycles: ['Cycle 1'], label: "Échelon 1 : (cycle 1)", description: "L’élève fait semblant de lire lorsqu’il feuillette un livre. Il parvient à se le raconter intérieurement ou à le raconter à autrui en s’appuyant notamment sur les illustrations. Dans les textes qu’il aborde, il reconnaît quelques mots familiers ou déjà vus en classe. Il réussit à suivre des consignes simples comprenant surtout des mots connus. Il cherche aussi à donner du sens aux écrits qu’il rencontre autour de lui et il en parle volontiers." },
          { id: 2, cycles: ['Cycle 1'], label: "Échelon 2 : (Cycle 1)", description: "L’élève lit des petits messages ou des textes courts, simples et illustrés constitués majoritairement de mots familiers et d’usage fréquent. Afin de construire du sens, il utilise, avec de l’aide, des stratégies de reconnaissance et d’identification de mots telles que les correspondances entre les lettres et les sons ainsi que le recours au contexte et aux illustrations. Il parvient à accomplir des tâches très simples liées à diverses intentions de lecture. Il réagit au texte dans la mesure où il est sollicité." },
          { id: 3, cycles: ['Cycle 1'], label: "Échelon 3 : (Cycle 1)", description: "L’élève lit des textes courants et littéraires, simples et illustrés, dont la structure est généralement prévisible. Pour comprendre l’essentiel d’un texte, il utilise les stratégies appropriées et rappelées par l’enseignant. Lorsqu’il accomplit des tâches simples liées à diverses intentions de lecture, il dégage les informations explicites nécessaires. Quand il réagit au texte, il exprime ses réactions en ayant recours surtout au dessin ou à la parole." },
          { id: 4, cycles: ['Cycle 1', 'Cycle 2'], label: "Échelon 4 : (Fin cycle 1 / début cycle 2)", description: "L’élève lit des textes courants et littéraires généralement courts, illustrés et présentant un niveau de difficulté approprié. Afin de comprendre les textes qu’il lit, l’élève a recours aux principales stratégies apprises. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture, il dégage la plupart des informations explicites contenues dans un ou plusieurs courts textes. De façon générale, il réagit spontanément aux textes et ses réactions, souvent liées à ses expériences personnelles, peuvent se manifester par le recours à la parole, au dessin, au mime, au non verbal et quelquefois à l’écrit." },
          { id: 5, cycles: ['Cycle 2'], label: "Échelon 5 : (Cycle 2)", description: "L’élève lit des textes courants et littéraires, proposant un défi approprié, généralement illustrés et présentés sur différents supports médiatiques. Il utilise la plupart des stratégies auxquelles il a été initié pour comprendre les textes. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture, il dégage les éléments d’information explicites et, à l’occasion, certains éléments d’information implicites liés à ses connaissances et à ses expériences personnelles. Il réagit aux textes qu’il lit et ses réactions, orales et parfois écrites, s’appuient aussi sur ses expériences personnelles." },
          { id: 6, cycles: ['Cycle 2'], label: "Échelon 6 : (Cycle 2)", description: "L’élève lit des textes courants et littéraires, proposant un défi approprié, souvent illustrés et présentés sur différents supports médiatiques. Il utilise les différentes stratégies apprises pour mieux saisir l’information. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture ou rattachées aux disciplines scolaires, il parvient à dégager des éléments d’information explicites et, parfois, quelques-uns qui sont implicites. Il réagit aux textes qu’il lit surtout en les reliant à ses expériences personnelles et parfois à d’autres textes qu’il a lus." },
          { id: 7, cycles: ['Cycle 2', 'Cycle 3'], label: "Échelon 7 : (Fin cycle 2 / début cycle 3)", description: "L’élève lit des textes courants et littéraires qui peuvent être illustrés et présentés sur différents supports médiatiques. Dans des textes qui présentent pour lui un défi raisonnable, il fait appel à diverses stratégies, dont certaines lui permettent de mieux saisir et organiser l’information. Pour répondre à diverses intentions de lecture et pour accomplir des tâches significatives dans plusieurs disciplines scolaires, il réussit à dégager les éléments d’information explicites et parfois ceux qui sont implicites. Lorsqu’il réagit à certains aspects des textes qu’il lit, il le fait généralement de façon pertinente en les reliant à ses expériences personnelles et à d’autres textes qu’il a lus." },
          { id: 8, cycles: ['Cycle 3'], label: "Échelon 8 : (cycle 3)", description: "L’élève lit une variété de textes courants et littéraires, présentés sur différents supports médiatiques et proposant un défi raisonnable. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture dans différentes disciplines scolaires, il dégage avec efficacité les éléments d’information explicites et quelques éléments d’information implicites contenus dans un même texte et, à l’occasion, dans plusieurs textes, en utilisant les stratégies pertinentes. Il réagit à divers aspects des textes en les reliant à ses expériences personnelles ou scolaires et parfois à d’autres lectures." },
          { id: 9, cycles: ['Cycle 3'], label: "Échelon 9 : (Cycle 3)", description: "L’élève lit une variété de textes courants et littéraires, présentés sur différents supports médiatiques et proposant un défi raisonnable. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture dans différents contextes et disciplines scolaires, il dégage les éléments d’information explicites et implicites contenus dans plusieurs textes en utilisant efficacement des stratégies pertinentes. Il réagit à plusieurs aspects des textes et ses réactions témoignent de son interprétation personnelle, de ses connaissances, de ses expériences personnelles ou scolaires ainsi que de ses autres lectures." },
          { id: 10, cycles: ['Cycle 3'], label: "Échelon 10 : (Cycle 3)", description: "L’élève lit une grande diversité de textes courants et littéraires, de niveaux de difficulté variables, et présentés sur différents supports médiatiques. Lorsqu’il accomplit des tâches liées à diverses intentions de lecture dans différents contextes et disciplines scolaires, il dégage les éléments d’information tant explicites qu’implicites contenus dans un ou plusieurs textes en ayant recours à des stratégies variées et pertinentes. Il réagit aux différents aspects des textes et ses réactions témoignent de ses champs d’intérêt, de son interprétation personnelle, de ses connaissances, de ses expériences personnelles ou scolaires ainsi que de ses autres lectures." }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [generatedPrompt, setGeneratedPrompt] = useState('');

          const [formData, setFormData] = useState(INITIAL_FORM_STATE);

          const handleChange = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));

          const handleCheckboxArray = (field, value, checked) => {
            setFormData(prev => {
              const array = [...prev[field]];

                                  <ul className="text-red-900 font-medium space-y-2">
                                    <li className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-red-500"></div>Tous les temps précédents</li>
                                    <li className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-red-500"></div>Plus-que-parfait</li>
                                    <li className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-red-500"></div>Conditionnel présent</li>
                                    <li className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-red-500"></div>Subjonctif présent</li>
                                  </ul>
                                </div>
                              </div>

                              <div className="p-8 bg-indigo-50/50 rounded-3xl border-2 border-indigo-100">
                                <h3 className="text-xl font-bold text-indigo-900 mb-6">Sélectionnez les temps à utiliser EXCLUSIVEMENT :</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                  {['Présent de l\'indicatif', 'Futur proche', 'Passé composé', 'Futur simple', 'Imparfait', 'Conditionnel présent', 'Impératif présent', 'Plus-que-parfait', 'Subjonctif présent'].map(t => {
                                    const isChecked = formData.tempsChoisis.includes(t);
                                    return (
                                      <label key={t} className={`flex items-center gap-4 p-4 cursor-pointer rounded-xl border-2 transition-all font-bold ${isChecked ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-700 hover:border-indigo-400'}`}>
                                        <input type="checkbox" className="w-6 h-6 rounded text-indigo-900 bg-white border-none focus:ring-0 cursor-pointer" 
                                               checked={isChecked}
                                               onChange={(e) => handleCheckboxArray('tempsChoisis', t, e.target.checked)} />
                                        <span>{t}</span>
                                      </label>
                                    );
                                  })}
                                </div>
                              </div>
                            </div>
                          )}
                        </div>
                      )}

                      {activeTab === 8 && (
                        <div className="animate-fade-in space-y-8">
                          
                          <div className="flex gap-4 p-6 bg-slate-50 border border-slate-200 rounded-3xl flex-wrap">
                            <div className="flex items-center gap-3 px-4 py-2 bg-slate-800 text-white rounded-xl font-bold text-sm shadow-sm">
                              <span className="w-6 h-6 rounded-full bg-slate-600 flex items-center justify-center">1</span> 
                              Texte (Toujours généré)
                            </div>
                            {formData.motsComplexes && (formData.typeAdaptation === 'personnalisees' || formData.typeAdaptation === 'aucune') && (
                              <div className="flex items-center gap-3 px-4 py-2 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-sm">
                                <span className="w-6 h-6 rounded-full bg-blue-500 flex items-center justify-center">2</span> 
                                Glossaire (Activé via l'onglet 4)
                              </div>
                            )}
                          </div>

                          <CheckboxCard 
                            label={<span className="font-bold flex items-center gap-3 text-2xl text-emerald-800"><span className="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center text-sm">3</span> Générer un QUESTIONNAIRE complet</span>}
                            checked={formData.activerQuestionnaire} 
                            onChange={(v) => handleChange('activerQuestionnaire', v)} 
                          />

                          {formData.activerQuestionnaire && (
                            <div className="animate-fade-in space-y-8">
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 p-8 bg-gradient-to-br from-emerald-50 to-teal-50 border-2 border-emerald-100 rounded-3xl shadow-inner">
                                {[
                                  { key: 'qReperage', label: 'Repérage', desc: 'Trouver l\'info écrite clairement.' },
                                  { key: 'qInference', label: 'Inférence', desc: 'Déduire une info entre les lignes.' },
                                  { key: 'qRappel', label: 'Rappel (Ordre)', desc: 'Reconstruire l\'ordre chronologique.' },
                                  { key: 'qReaction', label: 'Réaction', desc: 'Donner une opinion personnelle.' },
                                  { key: 'qAppreciation', label: 'Appréciation', desc: 'Porter un jugement critique justifié.' },
                                  { key: 'qInterpretation', label: 'Interprétation', desc: 'Saisir le sens profond, les valeurs.' }
                                ].map((q, index) => (
                                  <div key={q.key} className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white p-5 rounded-2xl border-2 border-emerald-100 hover:border-emerald-300 transition-colors shadow-sm">
                                    <div className="flex-1 min-w-0 pr-2">
                                      <div className="font-black text-slate-800 text-lg flex items-start sm:items-center gap-2 break-words">
                                        <span className="text-emerald-500 font-mono text-xl shrink-0">{index + 1}.</span> 
                                        <span>{q.label}</span>
                                      </div>
                                      <div className="text-sm text-slate-500 font-medium line-clamp-2">{q.desc}</div>
                                    </div>
                                    <div className="flex items-center gap-3 shrink-0 bg-slate-50 p-2 rounded-xl border border-slate-100">
                                      <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Qté.</label>
                                      <input 
                                        type="number" 
                                        min="0" 
                                        max="15" 
                                        className="w-16 p-2 text-xl text-center font-bold text-emerald-700 bg-white border-2 border-slate-200 rounded-lg focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 outline-none" 
                                        value={formData[q.key] === 0 ? '' : formData[q.key]} 
                                        placeholder="0"
                                        onChange={(e) => handleChange(q.key, e.target.value === '' ? 0 : Number(e.target.value))} 
                                      />
                                    </div>
                                  </div>
                                ))}
                              </div>

                              <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                <h3 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
                                  <span className="bg-indigo-600 text-white w-6 h-6 rounded-full flex justify-center items-center text-xs">📝</span> 
                                  Formats des questions (Optionnel / Au choix)
                                </h3>
                                <p className="text-slate-500 mb-6">Sélectionnez les structures exactes des questions que vous souhaitez générer.</p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                  {FORMATS_QUESTIONS.map(format => {
                                    const isChecked = formData.qTypes && formData.qTypes.includes(format.id);
                                    return (
                                      <label key={format.id} className={`flex items-start gap-4 p-5 cursor-pointer rounded-2xl border-2 transition-all duration-300 ${isChecked ? 'bg-indigo-50 border-indigo-500 shadow-md -translate-y-1' : 'bg-white border-slate-200 hover:border-indigo-300 hover:shadow-sm hover:-translate-y-1'}`}>
                                        <input type="checkbox" className="hidden" checked={isChecked} onChange={(e) => handleCheckboxArray('qTypes', format.id, e.target.checked)} />
                                        <div className={`mt-1 w-6 h-6 flex-shrink-0 rounded border-2 flex items-center justify-center transition-colors ${isChecked ? 'border-indigo-600 bg-indigo-600' : 'border-slate-300'}`}>
                                          {isChecked && <Check className="w-4 h-4 text-white" strokeWidth={3} />}
                                        </div>
                                        <div className="flex-1">
                                          <span className={`font-bold block text-lg transition-colors ${isChecked ? 'text-indigo-900' : 'text-slate-800'}`}>{format.label}</span>
                                          <span className="text-sm text-slate-500 mt-2 block leading-relaxed">{format.desc}</span>
                                        </div>
                                      </label>
                                    );
                                  })}
                                </div>
                              </div>
                            </div>
                          )}
                        </div>
                      )}

                      {activeTab === 9 && (
                        <div className="animate-fade-in space-y-8">
                          <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 mb-6">
                            <h3 className="text-xl font-bold text-indigo-900 mb-3">DESCRIPTION D’IMAGES (TRÈS DÉTAILLÉE)</h3>
                            <p className="text-indigo-800 mb-2"><strong>But :</strong> Générer des descriptions détaillées d’images (entre 3 et 6) pour illustrer le texte.</p>
                            <p className="text-indigo-800 text-sm">Les descriptions incluront : le lieu exact, les personnages (apparence, émotions), les actions, l'ambiance, les couleurs et les détails visuels importants.</p>
                          </div>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <RadioCard 
                              label="OUI - Générer 3 à 6 descriptions détaillées" 
                              description="L'IA créera des descriptions visuelles très précises (lieu, personnages, ambiance, couleurs) pour générer des illustrations."
                              value="OUI" 
                              current={formData.images} 
                              onChange={(v) => handleChange('images', v)} 
                            />
                            <RadioCard 
                              label="NON - Pas d'images" 
                              description="Ne pas générer de descriptions d'images."
                              value="NON" 
                              current={formData.images} 
                              onChange={(v) => handleChange('images', v)} 
                            />
                          </div>
                        </div>
                      )}

                      {activeTab === 10 && (
                        <div className="animate-fade-in space-y-6">
                          <div className="grid grid-cols-1 gap-4">
                            <RadioCard label="1. Format HTML (Mode Édition) - AVEC fond coloré" description="Idéal pour un copier/coller direct avec une mise en page spectaculaire." value="HTML_Color" current={formData.format} onChange={(v) => handleChange('format', v)} />
                            <RadioCard label="2. Format HTML (Mode Édition) - SANS fond coloré" description="Mise en page web propre et épurée." value="HTML_NoColor" current={formData.format} onChange={(v) => handleChange('format', v)} />
                            <RadioCard label="3. Format DOCX / Word (Texte brut éditable)" description="Texte propre, sans code, prêt pour un traitement de texte traditionnel." value="DOC" current={formData.format} onChange={(v) => handleChange('format', v)} />
                          </div>
                        </div>
                      )}

                      {/* RÉSULTAT DU PROMPT */}
                      {generatedPrompt && (
                        <div id="result-section" className="mt-16 p-8 bg-slate-900 rounded-3xl shadow-2xl relative overflow-hidden animate-fade-in">
                          <div className="absolute top-0 left-1/4 w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>
                          <div className="absolute bottom-0 right-1/4 w-96 h-96 bg-emerald-500/20 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>
                          
                          <div className="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-slate-700 pb-6">
                            <div>
                              <h3 className="text-2xl font-black text-white flex items-center gap-3">
                                <FileCode2 className="w-8 h-8 text-emerald-400" />
                                Requête prête à être exécutée !
                              </h3>
                              <p className="text-slate-400 mt-2 font-medium">Copiez ce code et collez-le dans votre IA favorite.</p>
                            </div>
                            <button 
                              onClick={copyPrompt} 
                              className={`flex items-center gap-3 px-8 py-4 rounded-xl font-bold transition-all text-lg shadow-lg ${copied ? 'bg-emerald-500 text-white shadow-emerald-500/30' : 'bg-indigo-600 hover:bg-indigo-500 text-white shadow-indigo-600/30 hover:-translate-y-1'}`}
                            >
                              {copied ? <CheckCircle className="w-6 h-6" /> : <Copy className="w-6 h-6" />}
                              {copied ? 'Copié avec succès !' : 'Copier la requête'}
                            </button>
                          </div>
                          
                          <textarea 
                            readOnly 
                            value={generatedPrompt} 
                            className="w-full h-96 p-6 font-mono text-sm leading-relaxed text-indigo-100 bg-slate-950/50 border border-slate-700 rounded-2xl resize-y outline-none focus:border-indigo-500 transition-colors custom-scrollbar relative z-10"
                          />
                        </div>
                      )}

                    </div>
                  </div>

                  {/* BARRE DE NAVIGATION EN BAS */}
                  <div className="flex-none p-6 md:px-12 md:py-8 bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] flex justify-between items-center z-20">
                    
                    <div className="flex items-center gap-3 md:gap-4">
                      <button 
                        onClick={handleReset}
                        className="flex items-center gap-2 px-4 md:px-5 py-3 md:py-4 rounded-2xl font-bold transition-all text-base md:text-lg text-rose-600 bg-rose-50 hover:bg-rose-100 hover:text-rose-700 hover:-translate-y-1"
                        title="Effacer tous les choix faits"
                      >
                        <Trash2 className="w-5 h-5 md:w-6 md:h-6" />
                        <span className="hidden xl:inline">Effacer tout</span>
                      </button>

                      <button 
                        onClick={() => {
                          setActiveTab(prev => Math.max(1, prev - 1));
                          if (scrollContainerRef.current) scrollContainerRef.current.scrollTop = 0;
                        }}
                        disabled={activeTab === 1}
                        className={`flex items-center gap-2 px-4 md:px-6 py-3 md:py-4 rounded-2xl font-bold transition-all text-base md:text-lg ${activeTab === 1 ? 'opacity-50 cursor-not-allowed bg-slate-100 text-slate-400' : 'bg-slate-100 hover:bg-slate-200 text-slate-700 hover:-translate-x-1'}`}
                      >
                        <ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /> <span className="hidden sm:inline">Précédent</span>
                      </button>
                    </div>
                    
                    {activeTab < 10 ? (
                      <button 
                        onClick={() => {
                          setActiveTab(prev => Math.min(10, prev + 1));
                          if (scrollContainerRef.current) scrollContainerRef.current.scrollTop = 0;
                        }}
                        className="flex items-center gap-3 px-6 md:px-10 py-3 md:py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black transition-all text-base md:text-lg shadow-xl shadow-indigo-600/20 hover:translate-x-1 hover:shadow-indigo-600/40"
                      >
                        <span className="hidden sm:inline">Étape</span> suivante <ChevronRight className="w-5 h-5 md:w-6 md:h-6" />
                      </button>
                    ) : (
                      <button 
                        onClick={generatePrompt}
                        className="flex items-center gap-3 px-6 md:px-10 py-3 md:py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white rounded-2xl font-black transition-all text-base md:text-lg shadow-xl shadow-emerald-500/30 hover:-translate-y-1 hover:shadow-emerald-500/50"
                      >
                        <FileCode2 className="w-5 h-5 md:w-6 md:h-6" /> Générer <span className="hidden sm:inline">la requête</span>
                      </button>
                    )}
                  </div>

                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
